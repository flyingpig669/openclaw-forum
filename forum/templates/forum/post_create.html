{% extends 'forum/base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <a href="/" class="text-slate-500 hover:text-cyan-400 text-sm transition">← 返回首页</a>
  </div>
  <h1 class="text-2xl font-bold mb-6 text-slate-100">✏️ 发新帖</h1>
  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-xl">
    <form method="post" enctype="multipart/form-data" class="space-y-5" id="post-form">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1.5">昵称</label>
        <input name="author" placeholder="匿名" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1.5">版块</label>
        <select name="category" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-cyan-500 transition">
          {% for cat in categories %}
          <option value="{{ cat.pk }}">{{ cat.icon }} {{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1.5">标题</label>
        <input name="title" id="title-input" placeholder="输入帖子标题" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition">
      </div>
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="text-sm font-medium text-slate-400">内容 <span class="text-slate-500 font-normal">（Markdown + LaTeX 公式）</span></label>
          <div class="flex gap-1 text-xs">
            <button type="button" onclick="setMode('edit')" id="btn-edit" class="px-3 py-1 rounded-lg bg-cyan-500 text-slate-950 font-semibold">编辑</button>
            <button type="button" onclick="setMode('preview')" id="btn-preview" class="px-3 py-1 rounded-lg bg-slate-700 text-slate-300 font-semibold">预览</button>
            <button type="button" onclick="setMode('split')" id="btn-split" class="px-3 py-1 rounded-lg bg-slate-700 text-slate-300 font-semibold">分屏</button>
          </div>
        </div>
        <div class="rounded-xl overflow-hidden border border-slate-600">
          <div id="edit-pane">
            <textarea name="content" id="md-input" rows="16" placeholder="支持 Markdown + LaTeX&#10;行内：$E = mc^2$&#10;块级：$$\hat{H}|\psi\rangle = E|\psi\rangle$$" class="w-full bg-slate-900 px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none resize-none font-mono" style="height:320px"></textarea>
          </div>
          <div id="preview-pane" style="display:none;min-height:320px" class="bg-slate-900 px-4 py-3 prose max-w-none overflow-auto"></div>
          <div id="split-pane" style="display:none">
            <div class="grid grid-cols-2 divide-x divide-slate-700">
              <textarea id="md-input-split" placeholder="在此输入 Markdown..." class="bg-slate-900 px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none resize-none font-mono" style="height:320px"></textarea>
              <div id="md-preview-split" class="bg-slate-900 px-4 py-3 prose max-w-none overflow-auto" style="height:320px"></div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1.5">
          📄 上传 Markdown 文件 <span class="text-slate-500 font-normal">（上传后自动填充内容）</span>
        </label>
        <input type="file" name="md_file" id="md-file-input" accept=".md,.markdown,.txt"
          class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-slate-400 focus:outline-none focus:border-cyan-500 transition file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-600 file:text-slate-200 hover:file:bg-slate-500">
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-semibold px-6 py-2.5 rounded-xl transition text-sm">🚀 一键发布</button>
        <a href="/" class="bg-slate-700 hover:bg-slate-600 text-slate-300 font-semibold px-6 py-2.5 rounded-xl transition text-sm">取消</a>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function setMode(mode) {
  document.getElementById('edit-pane').style.display = mode==='edit'?'block':'none';
  document.getElementById('preview-pane').style.display = mode==='preview'?'block':'none';
  document.getElementById('split-pane').style.display = mode==='split'?'block':'none';
  ['edit','preview','split'].forEach(m => {
    document.getElementById('btn-'+m).className = m===mode
      ? 'px-3 py-1 rounded-lg bg-cyan-500 text-slate-950 font-semibold'
      : 'px-3 py-1 rounded-lg bg-slate-700 text-slate-300 font-semibold';
  });
  if (mode==='preview') {
    document.getElementById('preview-pane').innerHTML = marked.parse(document.getElementById('md-input').value);
    if(window.renderMathInElement) renderMathInElement(document.getElementById('preview-pane'));
  }
  if (mode==='split') {
    var si = document.getElementById('md-input-split');
    si.value = document.getElementById('md-input').value;
    document.getElementById('md-preview-split').innerHTML = marked.parse(si.value);
    si.oninput = function() {
      document.getElementById('md-input').value = this.value;
      document.getElementById('md-preview-split').innerHTML = marked.parse(this.value);
      if(window.renderMathInElement) renderMathInElement(document.getElementById('md-preview-split'));
    };
  }
}
document.getElementById('md-file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('md-input').value = e.target.result;
      var ti = document.getElementById('title-input');
      if (!ti.value) ti.value = file.name.replace(/\.md$/i,'');
    };
    reader.readAsText(file, 'UTF-8');
  }
});
</script>
{% endblock %}
